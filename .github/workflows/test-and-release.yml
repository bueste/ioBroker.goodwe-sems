name: Test and Release

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request: {}

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint

  unit-tests:
    name: Unit + package tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test

  adapter-check:
    name: ioBroker repository checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx --yes @iobroker/repochecker "https://github.com/${{ github.repository }}" "${{ github.ref_name }}"

  release:
    name: Publish to npm on tag (OIDC trusted publishing)
    needs: [lint, unit-tests, adapter-check]
    if: contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for npm OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # trusted publishing requires npm CLI >=11.5.1 / Node >=22.14
          registry-url: "https://registry.npmjs.org"
      # Node 22 currently bundles npm 10.9.x, which is BELOW the npm CLI
      # version required for OIDC trusted publishing (>=11.5.1). Force an
      # upgrade of the npm CLI itself before installing/publishing.
      - run: npm install -g npm@latest
      - run: npm --version
      - run: npm ci
      # No NPM_TOKEN needed: npm CLI exchanges the GitHub Actions OIDC token
      # for a short-lived publish credential once the trusted publisher is
      # configured for this package on npmjs.com (org=bueste, repo=ioBroker.goodwe-sems,
      # workflow filename=test-and-release.yml).
      - run: npm publish
